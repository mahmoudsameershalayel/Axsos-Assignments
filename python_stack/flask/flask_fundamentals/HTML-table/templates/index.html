<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites/dist/css/foundation.min.css">

    <style>
        body {
            background: #f4f6f8;
            padding: 40px;
            font-family: Arial;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: bold;
        }

        table thead {
            background: #2c3e50;
            color: white;
        }

        tbody tr:hover {
            background: #f1f1f1;
            transition: 0.2s;
        }
    </style>
</head>

<body>

<div class="grid-container">
    <div class="table-container">

        <h2>Manage Users</h2>

        <table class="stack">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Full Name</th>
                </tr>
            </thead>

            <tbody class="hover">
                {% for user in users %}
                    <tr>
                        <td>{{user['first_name']}}</td>
                        <td>{{user['last_name']}}</td>
                        <td>{{user['first_name']}} {{user['last_name']}}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
