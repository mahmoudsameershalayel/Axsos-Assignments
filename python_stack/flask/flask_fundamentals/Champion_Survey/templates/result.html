<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="card p-4 shadow">
        <h3>Submitted Info</h3>

        <div class="collection">
          <label>Name:</label>
          <span>{{ name }}</span>
        </div>

        <div class="collection">
          <label>Location:</label>
          <span>{{ location }}</span>
        </div>

        <div class="collection">
          <label>Favorite Language:</label>
          <span>{{ language }}</span>
        </div>

        <div class="collection">
          <label>experience:</label>
          <span>{{ experience }}</span>
        </div>

        <div class="collection">
          <label>techs:</label>
          {% for tech in techs%}
          <span>{{tech}}</span>
          {% endfor%}
        </div>

        <div class="collection">
          <label>Comment:</label>
          <span>{{ comment }}</span>
        </div>

        <a href="/" class="btn btn-primary">Back to Survey</a>
      </div>
    </div>
  </body>
</html>
