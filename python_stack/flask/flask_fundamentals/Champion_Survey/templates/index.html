<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h2 class="mb-4">Survey Form</h2>
        <form action="/result" method="POST">
          <div class="mb-3">
            <label class="form-label">Your Name:</label>
            <input type="text" name="user_name" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Dojo Location:</label>
            <select name="location" class="form-select">
              <option value="gaza">Gaza</option>
              <option value="khan_younis">Khan Younis</option>
              <option value="rafah">Rafah</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Favorite Language:</label>
            <select name="language" class="form-select">
              <option value="python">Python</option>
              <option value="c#">C#</option>
              <option value="java">Java</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Experience Level:</label>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="beginner"
                name="experience"
                value="beginner"
              />
              <label class="form-check-label" for="beginner">Beginner</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="experience"
                value="intermediate"
                id="intermediate"
              />
              <label class="form-check-label" for="intermediate"
                >Intermediate</label
              >
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="experience"
                value="advanced"
                id="advanced"
              />
              <label class="form-check-label" for="advanced">Advanced</label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Technologies You Like:</label>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="techs"
                value="python"
                id="python"
              />
              <label class="form-check-label" for="python">Python</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="techs"
                value="csharp"
                id="csharp"
              />
              <label class="form-check-label" for="csharp">C#</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="techs"
                value="java"
                id="java"
              />
              <label class="form-check-label" for="java">Java</label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Comment:</label>
            <textarea name="comment" class="form-control"></textarea>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
