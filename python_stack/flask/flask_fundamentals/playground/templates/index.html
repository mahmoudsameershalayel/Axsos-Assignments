<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        h1{
            text-align: center;
            margin: 50px 0; 
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .box{
            width: 20%;
            min-width: 300px;
            height: 250px;
            border: 2px solid black;
            background-color:{{ card_color }};
        }
    </style>
</head>
<body>
    <h1>Welcome!</h1>
    <div class="container">
    {% for x in range(0, card_nums) %}
            <div class="box"></div>
    {% endfor %}
    </div>
</body>
</html>
