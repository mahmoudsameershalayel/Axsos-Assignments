<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checker Board</title>
    <!-- linking a CSS stylesheet -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="board" style="grid-template-columns: repeat({{ cols }}, 60px); grid-template-rows: repeat({{ rows }}, 60px);">
        {% for row in range(rows) %}
            {% for col in range(cols) %}
                <div style="background-color: {% if (row + col) % 2 == 0 %}{{ color1 }}{% else %}{{ color2 }}{% endif %};"></div>
            {% endfor %}
        {% endfor %}
    </div>
  </body>
</html>
